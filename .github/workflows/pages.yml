name: Deploy web UI to GitHub Pages

# Publishes the static browser app in web/ to GitHub Pages. No build step — the app is
# plain ES modules + JSON, served as-is.

on:
  push:
    branches: [main, master]
    paths:
      - "web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stamp build version
        run: printf '{"build":"%s","date":"%s"}\n' "$(git rev-parse --short HEAD)" "$(date -u +%FT%TZ)" > web/version.json
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
