<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>cartalk</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>cartalk</h1>
    <span id="adapter" class="badge">…</span>
  </header>

  <main>
    <section class="controls">
      <label for="vehicle">Vehicle</label>
      <select id="vehicle"></select>
      <label class="check"><input type="checkbox" id="readData"> read live data</label>
      <button id="scanBtn">Scan all modules</button>
    </section>

    <section id="status" class="status" hidden></section>

    <section id="results"></section>

    <footer id="transcript" hidden>
      <a id="downloadLink" href="#" download>⤓ Download session transcript (.jsonl)</a>
    </footer>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
